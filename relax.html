<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sleep & Relax - Glory Radio</title>
    <link rel="icon" type="image/png" href="images/favicon.PNG">
    <link rel="apple-touch-icon" href="images/icon.PNG">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Glory Sleep & Relax">
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; color: white; overflow-x: hidden; background-image: url("images/background.PNG"); background-size: cover; background-position: center; background-attachment: fixed; background-color: black; min-height: 100vh; }
        .container { max-width: 650px; margin: auto; padding: 50px 15px; position: relative; z-index: 10; }
        .logo-wrapper { position: relative; display: inline-block; margin-bottom: 30px; }
        .logo { width: 180px; border-radius: 50%; z-index: 20; position: relative; box-shadow: 0 0 15px rgba(124, 231, 255, 0.3); }
        .star-orbit { position: absolute; width: 5px; height: 5px; z-index: 21; }
        .tiny-star { width: 3px; height: 3px; background: rgba(255, 255, 255, 0.9); border-radius: 50%; box-shadow: 0 0 5px #fff, 0 0 8px rgba(124, 231, 255, 0.6); animation: makeTinyCircle 4s linear infinite; }
        @keyframes makeTinyCircle { from { transform: rotate(0deg) translateX(2px) rotate(0deg); } to { transform: rotate(360deg) translateX(2px) rotate(-360deg); } }
        .twinkle-star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; box-shadow: 0 0 5px #fff, 0 0 8px rgba(124, 231, 255, 0.4); animation: twinkleFade 4s ease-in-out infinite; z-index: 5; pointer-events: none; }
        @keyframes twinkleFade { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.8; transform: scale(1.2); } }
        .player { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); padding: 20px; border-radius: 40px; border: 1px solid rgba(124, 231, 255, 0.15); margin-bottom: 25px; position: relative; z-index: 100; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .embed-container { width: 100%; border-radius: 25px; overflow: hidden; }
        .section { background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; margin-top: 15px; border: 1px solid rgba(255, 255, 255, 0.08); position: relative; z-index: 20; }
        h3, b { color: #7ce7ff; }
        .btn { background: linear-gradient(45deg, #4ac7e6, #7ce7ff); color: #000; padding: 12px 20px; border-radius: 12px; border: none; font-weight: bold; margin: 8px; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block; font-size: 0.9em; position: relative; z-index: 21; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(124, 231, 255, 0.3); }

        /* MODAL STYLES */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none; /* Hidden by default */
            align-items: center; justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #1a1a1a;
            padding: 35px 25px;
            border-radius: 25px;
            max-width: 90%; width: 380px;
            border: 1px solid rgba(124, 231, 255, 0.4);
            text-align: center;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 28px;
            color: #7ce7ff;
            cursor: pointer;
            opacity: 0.7;
        }

        .close-modal:hover { opacity: 1; }

        .donate-option {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: 0.3s;
        }

        .donate-option:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #7ce7ff;
            transform: scale(1.02);
        }

        .icon-img { height: 24px; border-radius: 4px; }

        .note { position: fixed; font-size: 35px; color: #fff; text-shadow: 0 0 10px #7ce7ff, 0 0 20px #7ce7ff; z-index: 1; pointer-events: none; animation: noteFall linear infinite; }
        @keyframes noteFall { from { transform: translateY(-10vh) rotate(0deg); opacity: 0; } 15% { opacity: 0.8; } 85% { opacity: 0.8; } to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
    <style>html { display: none; }</style>
    <script>
        (async function() {
            const targetHash = "d4f7360bf672e7ff9c76551480813fce81ef17572da3cfd0fdbc959aa07a9ac9";
            const password = prompt("Please enter the password to access this station:");
            if (password) {
                const msgUint8 = new TextEncoder().encode(password);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                if (hashHex === targetHash) {
                    document.documentElement.style.display = 'block';
                    return;
                }
            }
            window.location.href = "index.html";
        })();
    </script>
</head>

<body>

<div class="modal-overlay" id="donateModal">
    <div class="modal-content">
        <span class="close-modal" id="closeBtn">&times;</span>
        <h2 style="color:#7ce7ff; margin-top:0;" id="modalTitle">Support Glory Radio</h2>
        <p style="font-size: 0.9em; color:#ddd; margin-bottom: 20px;" id="modalSub">Thank you for your support!</p>
        
        <a href="https://revolut.me/emmanohc3m" target="_blank" class="donate-option">
            <img src="images/revolut-icon.PNG" class="icon-img" alt="Revolut">
            <span>Revolut Pay</span>
        </a>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
            <a href="https://revolut.me/emmanohc3m" target="_blank" class="donate-option" style="margin:0; padding: 12px; justify-content: center;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b0/Apple_Pay_logo.svg" style="height:22px; filter: brightness(0) invert(1);" alt="Apple Pay">
            </a>
            
            <a href="https://revolut.me/emmanohc3m" target="_blank" class="donate-option" style="margin:0; padding: 12px; justify-content: center;">
                <img src="images/google-pay-icon.PNG" style="height:34px; transform: scale(1.31) translateY(1px);" alt="Google Pay">
            </a>
            
            <a href="https://revolut.me/emmanohc3m" target="_blank" class="donate-option" style="margin:0; padding: 12px; grid-column: span 2; justify-content: center;">
                <span style="font-size: 0.9em; text-align: center;" id="cardText">Debit / Credit Card</span>
            </a>
        </div>

        <div style="margin: 20px 0; height: 1px; background: rgba(255,255,255,0.1);"></div>

        <a href="https://www.paypal.com/paypalme/emmanohc3m" target="_blank" class="donate-option">
            <img src="https://www.paypalobjects.com/webstatic/mktg/logo/pp_cc_mark_37x23.jpg" class="icon-img" alt="PayPal">
            <span>PayPal</span>
        </a>
    </div>
</div>

<div class="container">
    <div class="logo-wrapper">
        <div class="star-orbit" style="top: 20px; right: -10px;"><div class="tiny-star"></div></div>
        <div class="star-orbit" style="bottom: 50px; left: -20px;"><div class="tiny-star" style="animation-delay:-2s;"></div></div>
        <img src="images/logo.PNG" class="logo" alt="Glory Radio">
    </div>

    <div class="player">
        <h2 id="station-name" style="color: #7ce7ff; margin-top: 0; margin-bottom: 15px; font-size: 1.4em;">...</h2>
        <div class="embed-container">
            <iframe src="https://panel.gloryradio.gr/public/glory_sleep__relax/embed?theme=dark" frameborder="0" allowtransparency="true" style="width: 100%; min-height: 200px;"></iframe>
        </div>
    </div>

    <div class="section">
        <h3 id="suppTitle" style="margin-top:0;">Support the Station</h3>
        <button class="btn" id="openDonate" style="background: #ffcf4d; min-width: 150px; color: #000;">Donate Now</button>
    </div>

    <div class="section">
        <h3 id="moreTitle" style="margin-top:0;">More Stations</h3>
        <a href="index.html" class="btn">Main Glory Radio</a>
        <a href="plus.html" class="btn">Glory Radio Plus</a>
        <a href="country.html" class="btn">Country & Southern Gospel</a>
    </div>
</div>

<script>
    // LOCALIZATION
    const userLang = navigator.language || 'en';
    const isGreek = userLang.startsWith('el');

    document.addEventListener('DOMContentLoaded', () => {
        // MODAL CONTROLS
        const donateModal = document.getElementById('donateModal');
        const openDonateBtn = document.getElementById('openDonate');
        const closeBtn = document.getElementById('closeBtn');

        if (openDonateBtn) {
            openDonateBtn.onclick = (e) => { 
                e.preventDefault();
                donateModal.style.display = 'flex'; 
            };
        }
        if (closeBtn) {
            closeBtn.onclick = () => { donateModal.style.display = 'none'; };
        }
        window.onclick = (e) => { 
            if(e.target == donateModal) donateModal.style.display = 'none'; 
        };

        // LOCALIZATION
        if(isGreek) {
            const translations = {
                'modalTitle': "Υποστηρίξτε το Glory Radio",
                'modalSub': "Ευχαριστούμε για τη στήριξη!",
                'cardText': "Χρεωστική / Πιστωτική Κάρτα",
                'moreTitle': "Περισσότεροι Σταθμοί",
                'suppTitle': "Στηρίξτε τον Σταθμό",
                'openDonate': "Δωρεά Τώρα"
            };
            for (const [id, text] of Object.entries(translations)) {
                const el = document.getElementById(id);
                if (el) el.innerText = text;
            }
        }

        // FETCH STATION NAME
        fetch('https://panel.gloryradio.gr/api/nowplaying/glory_sleep__relax')
            .then(response => response.json())
            .then(data => {
                const stationNameEl = document.getElementById('station-name');
                if (stationNameEl && data.station && data.station.name) {
                    stationNameEl.innerText = data.station.name;
                }
            })
            .catch(err => console.error('Error fetching station name:', err));
    });

    setInterval(() => {
        const n = document.createElement("div"); n.className = "note";
        n.innerHTML = ["♪", "♫", "♩", "♬"][Math.floor(Math.random() * 4)];
        n.style.left = Math.random() * 100 + "%"; n.style.animationDuration = (7 + Math.random() * 5) + "s";
        document.body.appendChild(n); setTimeout(() => n.remove(), 12000);
    }, 600);
</script>
</body>
</html>
